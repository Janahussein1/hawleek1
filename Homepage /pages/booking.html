<h2>Restaurant Reservations</h2>

<ul>
<li>Total Reservations: <strong id="stat-total">0</strong></li>
<li>Pending: <strong id="stat-pending">0</strong></li>
<li>Cancelled: <strong id="stat-cancelled">0</strong></li>
</ul>

<form id="addReservationForm">
<label>Name:
<input type="text" id="resName" required>
</label>
<label>Guests:
<input type="number" id="resGuests" required>
</label>
<label>Date & Time:
<input type="datetime-local" id="resDateTime" required>
</label>
<button type="submit">Add Reservation</button>
</form>

<table>
<thead>
<tr>
<th>Name</th>
<th>Guests</th>
<th>Date & Time</th>
<th>Status</th>
<th>Actions</th>
</tr>
</thead>
<tbody id="reservation-table-body">
</tbody>
</table>

<script src="../../dashboard/javadashboard.js"></script>
</body>
</html>
