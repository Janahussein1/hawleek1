    <meta charset="UTF-8">

    <link rel="stylesheet" href="../css/style.css">
    
</head>
<body>
    <header> 
        <nav class="navbar">
            <div class="logo"> Hawaleek </div>  
            <ul>
                <li> <a href="index.html" class="active"> Home </a></li>
                <li> <a href="pages/services.html"> Local Directory </a></li>
                <li> <a href="pages/booking.html"> Booking </a> </li>

        </nav>

    <main> 
        <section id="home" class="welcome-section">
            <h1> Your Neighborhood, connected. </h1>
            <p> Discover Local shops, track microbuses, and book experts in seconds.</p>
            <a href="pages/services.html" class="explore-btn"> Explore More </a>
        </section>

        <section class="search-container">
            <h2> Find What You Need </h2>
            <form id="searchform">
                <label for="searchQuery" class="hidden-label"> Search </label>
                <input type="text" id="searchQuery" name="searchQuery" placeholder="Search for a restaurant, service, or station...">
                
                <label for="category" class="hidden-label"> Category </label>
                <select name="Category" id="category">
                    <option value="all"> All Categories </option> 
                    <option value="Food"> Restaurants & Cafes </option>
                    <option value="Transport"> Transport Hubs </option> 
                    <option value="Service"> Technicians & Services </option>
                    <option value="Clinics"> Medical Clinics </option>
                </select> 
                <button type="submit"> Search </button>                             
            </form>
        </section>
    </main>
