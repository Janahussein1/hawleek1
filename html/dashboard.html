<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
</head>
<body>

    <nav>
        <a href="#">Dashboard</a> | 
        <a href="pages/clinics.html">Clinics</a> | 
        <a href="pages/transport.html">Transport</a> | 
        <a href="index.html">Logout</a>
    </nav>

    <hr>

    <h1>Restaurant Management Dashboard</h1>

    <h2>Reservation Counts</h2>
    <ul>
        <li>Total Bookings: <strong id="stat-total">0</strong></li>
        <li>Pending: <strong id="stat-pending">0</strong></li>
        <li>Cancelled: <strong id="stat-cancelled">0</strong></li>
    </ul>

    <hr>

    <h2>Add New Reservation</h2>
    <form id="addReservationForm">
        <label>Customer Name: <input type="text" id="resName" required></label><br><br>
        <label>Number of Guests: <input type="number" id="resGuests" required min="1"></label><br><br>
        <label>Date & Time: <input type="datetime-local" id="resDateTime" required></label><br><br>
        <button type="submit">Add Reservation</button>
    </form>

    <hr>

    <h2>All Reservations</h2>
    <table border="1" cellpadding="10" cellspacing="0" width="100%">
        <thead>
            <tr>
                <th>Customer Name</th>
                <th>Guests</th>
                <th>Date & Time</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="reservation-table-body">
            </tbody>
    </table>

    <script src="javadashboard.js"></script>

</body>
</html>
