<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hawlek | Admin Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="dashboard-container">
    <aside class="sidebar">
        <h2>Hawlek Admin</h2>
        <nav>
            <ul> 
                <li><a href="#" class="active">Dashboard</a></li>
                <li><a href="pages/clinics.html">Clinics</a></li>
                <li><a href="pages/transport.html">Transport</a></li>
                <li><a href="index.html">Logout</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header>
            <h1>Restaurant Management</h1>
            <p>Welcome back, Administrator.</p>
        </header>

        <section class="stats-container">
            <article class="card">
                <h3>Total Bookings</h3>
                <p class="stat-number" id="stat-total">0</p>
            </article>
            <article class="card">
                <h3>Pending</h3>
                <p class="stat-number" id="stat-pending">0</p>
            </article>
            <article class="card">
                <h3>Cancelled</h3>
                <p class="stat-number" id="stat-cancelled">0</p>
            </article>
        </section>

        <section class="add-form-container">
            <h2>Add New Reservation</h2>
            <form id="addReservationForm">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="resName" required>
                </div>
                <div class="form-group">
                    <label>Number of Guests</label>
                    <input type="number" id="resGuests" required min="1">
                </div>
                <div class="form-group">
                    <label>Date & Time</label>
                    <input type="datetime-local" id="resDateTime" required>
                </div>
                <button type="submit" class="btn-add">Add Reservation</button>
            </form>
        </section>

        <section class="table-wrapper">
            <h2>All Reservations</h2>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Customer name</th>
                            <th>Guests</th>
                            <th>Date & time</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="reservation-table-body">
                        <!-- JS will fill this -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<script src="javadashboard.js"></script>
</body>
</html>
